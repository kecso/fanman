# docker-compose.yml — local development / CLI deploy (relative ./config bind mount).
# For Portainer with Git stacks and absolute host paths, use compose.portainer.yml — see README.md.

services:
  fanman:
    image: fanman:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fanman
    restart: unless-stopped

    cap_add:
      - SYS_RAWIO
      - DAC_OVERRIDE

    ports:
      - "8080:8080"

    volumes:
      - /sys:/host-sys:rw
      - /proc:/host-proc:ro
      - ./config:/app/config:rw

    devices:
      - /dev/sda:/dev/sda

    environment:
      - SYSFS_PREFIX=/host-sys
      - PROC_PREFIX=/host-proc
      - POLL_INTERVAL=5
      - LOG_LEVEL=info
      - CONFIG_PATH=/app/config/fan_curves.json
      - WEB_PORT=8080
      - FAILSAFE_TEMP=85
      - GRACEFUL_SHUTDOWN_MODE=2
      - MAX_HISTORY_MINUTES=60

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
