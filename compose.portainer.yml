# FanMan — Portainer stack (Compose)
#
# Container image: ghcr.io/kecso/fanman (published from GitHub Actions → GHCR).
# Override `image:` only when pointing at a different registry or local mirror.
#
# Portainer: Stacks → Add stack → Repository; compose path: compose.portainer.yml
#
# ghcr.io authentication: configure Portainer Registries or GitHub Packages visibility if pulls fail.
#
# Host: config dir on disk (see volumes), containing fan_curves.json.
#
# Pin a tag instead of :latest when you want a fixed version (e.g. ghcr.io/kecso/fanman:1.0.0).

services:
  fanman:
    image: ghcr.io/kecso/fanman:latest
    container_name: fanman
    restart: unless-stopped

    cap_add:
      - SYS_RAWIO
      - DAC_OVERRIDE

    ports:
      - "8080:8080"

    volumes:
      - /sys:/host-sys:rw
      - /proc:/host-proc:ro
      # Replace left side with YOUR host path containing fan_curves.json
      - /opt/fanman/config:/app/config:rw

    devices:
      - /dev/sda:/dev/sda

    environment:
      SYSFS_PREFIX: /host-sys
      PROC_PREFIX: /host-proc
      POLL_INTERVAL: "5"
      LOG_LEVEL: info
      CONFIG_PATH: /app/config/fan_curves.json
      WEB_PORT: "8080"
      FAILSAFE_TEMP: "85"
      GRACEFUL_SHUTDOWN_MODE: "2"
      MAX_HISTORY_MINUTES: "60"

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
