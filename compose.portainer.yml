# FanMan — Portainer stack (Compose)
#
# Default `image:` matches CI output: ghcr.io/<owner>/<repo> on GitHub (Actions → GHCR).
# Forks: override `image:` if your registry path differs.
#
# Portainer: Stacks → Add stack → Repository; compose path: compose.portainer.yml
#
# ghcr.io + private repos: publish the package or add registry credentials in Portainer.
#
# Host: prepare config dir (e.g. /opt/fanman/config) and fan_curves.json.
#
# Pin a version if you do not want :latest (e.g. ghcr.io/org/fanman:1.0.0).

services:
  fanman:
    image: ghcr.io/kecso/fanman:latest
    container_name: fanman
    restart: unless-stopped

    cap_add:
      - SYS_RAWIO
      - DAC_OVERRIDE

    ports:
      - "8080:8080"

    volumes:
      - /sys:/host-sys:rw
      - /proc:/host-proc:ro
      # Replace left side with YOUR host path containing fan_curves.json
      - /opt/fanman/config:/app/config:rw

    devices:
      - /dev/sda:/dev/sda

    environment:
      SYSFS_PREFIX: /host-sys
      PROC_PREFIX: /host-proc
      POLL_INTERVAL: "5"
      LOG_LEVEL: info
      CONFIG_PATH: /app/config/fan_curves.json
      WEB_PORT: "8080"
      FAILSAFE_TEMP: "85"
      GRACEFUL_SHUTDOWN_MODE: "2"
      MAX_HISTORY_MINUTES: "60"

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
